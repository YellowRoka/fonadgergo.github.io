<svg width="1600" height="1400" viewBox="0 0 1600 1400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="panelStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2F62FF"/>
      <stop offset="100%" stop-color="#6FDCFF"/>
    </linearGradient>
    <linearGradient id="panelFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#12233C" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#0A1423" stop-opacity="0.9"/>
    </linearGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#58A6FF" stop-opacity="0.85"/>
      <stop offset="55%" stop-color="#2C63FF" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#2C63FF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lineGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4A7FFF" stop-opacity="0.78"/>
      <stop offset="100%" stop-color="#6FDCFF" stop-opacity="0.58"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="22" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="cardGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

