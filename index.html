  <script>
    (function () {
      var hostname = window.location.hostname;
      var pathname = window.location.pathname;
      var isLocal =
        hostname === "localhost" ||
        hostname === "127.0.0.1" ||
        hostname === "0.0.0.0";
      var baseHref = "/";

      if (!isLocal) {
        baseHref = pathname.endsWith("/")
          ? pathname
          : pathname.substring(0, pathname.lastIndexOf("/") + 1);
      }

      document.write('<base href="' + baseHref + '">');
    })();
  </script>

  <style>
    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top left, rgba(27, 79, 219, 0.22), transparent 32%),
        radial-gradient(circle at 85% 20%, rgba(116, 224, 255, 0.14), transparent 28%),
        linear-gradient(135deg, #08111e 0%, #050c17 100%);
    }

    body {
      overflow: hidden;
      color: #e2eeff;
      font-family: "Segoe UI", sans-serif;
    }

    .app-loader {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background: transparent;
    }

    .app-loader__frame {
      width: min(82vw, 420px);
      padding: 28px 26px;
      border: 1px solid rgba(156, 178, 202, 0.18);
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(15, 28, 46, 0.82), rgba(9, 20, 34, 0.68));
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(16px);
    }

    .app-loader__eyebrow {
      margin: 0 0 12px;
      color: rgba(220, 233, 255, 0.74);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }

    .app-loader__title {
      margin: 0 0 14px;
      font-size: clamp(26px, 5vw, 38px);
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .app-loader__meta {
      margin: 0;
      color: rgba(214, 228, 249, 0.82);
      font-size: 14px;
      line-height: 1.6;
    }

    .app-loader__bar {
      margin-top: 18px;
      width: 100%;
      height: 4px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
    }

    .app-loader__bar::after {
      content: "";
      display: block;
      width: 38%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #3e7bff, #74e0ff);
      animation: loader-slide 1.8s ease-in-out infinite;
    }

    @keyframes loader-slide {
      0% { transform: translateX(-120%); }
      100% { transform: translateX(280%); }
    }
  </style>
